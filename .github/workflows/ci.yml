name: Trainer CI

on:
  push:
    branches: [master]
  pull_request:
    branches: [master]

env:
  GIT_SHA: ${{ github.event_name == 'pull_request' && github.event.pull_request.head.sha || github.sha }}
  GIT_REF: ${{ github.ref_name }} # returns the name of the merge ref in PRs


jobs:
  unit-test:
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v6

      - name: Install uv
        uses: astral-sh/setup-uv@08807647e7069bb48b6ef5acd8ec9567f424441b
        with:
          enable-cache: "true"

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version-file: .python-version

      - name: Install dependencies
        run: uv sync --locked

      - name: Run tests
        run: uv run pytest

  image:
    runs-on: ubuntu-latest
    needs: unit-test
    steps:
      - name: Docker login
        uses: docker/login-action@v4
        with:
          registry: ${{ secrets.CONTAINER_REGISTRY_HOST }}
          username: ${{ secrets.CONTAINER_REGISTRY_USERNAME }}
          password: ${{ secrets.CONTAINER_REGISTRY_PASSWORD }}

      - name: Docker buildx setup
        uses: docker/setup-buildx-action@v4

      - name: Docker build & push
        uses: docker/build-push-action@v7
        with:
          push: true
          tags: ${{ secrets.CONTAINER_REGISTRY_HOST }}/mmim/mmim-trainer:${{ env.GIT_REF }}-${{ env.GIT_SHA }}
          labels: |
            org.opencontainers.image.revision=${{ env.GIT_SHA }}
            org.opencontainers.image.ref.name=${{ env.GIT_REF }}
